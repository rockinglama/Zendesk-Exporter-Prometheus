# Example — do NOT commit with real values.
# Create with:
#   kubectl create secret generic zendesk-exporter \
#     --from-literal=subdomain=yourcompany \
#     --from-literal=email=agent@company.com \
#     --from-literal=api-token=YOUR_TOKEN
#
# Or for OAuth:
#   kubectl create secret generic zendesk-exporter \
#     --from-literal=subdomain=yourcompany \
#     --from-literal=oauth-token=YOUR_OAUTH_TOKEN
apiVersion: v1
kind: Secret
metadata:
  name: zendesk-exporter
  labels:
    app.kubernetes.io/name: zendesk-exporter
type: Opaque
stringData:
  subdomain: "yourcompany"
  email: "agent@company.com"
  api-token: "REPLACE_ME"
  # oauth-token: "REPLACE_ME"
