apiVersion: apps/v1
kind: Deployment
metadata:
  name: zendesk-exporter
  labels:
    app.kubernetes.io/name: zendesk-exporter
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zendesk-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zendesk-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: zendesk-exporter
          image: zendesk-exporter:latest  # Replace with your registry image
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: PORT
              value: "9091"
            - name: SCRAPE_INTERVAL_SECONDS
              value: "300"
            - name: LOG_LEVEL
              value: "info"
            - name: ZENDESK_SUBDOMAIN
              valueFrom:
                secretKeyRef:
                  name: zendesk-exporter
                  key: subdomain
            # --- Auth option 1: API token ---
            - name: ZENDESK_EMAIL
              valueFrom:
                secretKeyRef:
                  name: zendesk-exporter
                  key: email
                  optional: true
            - name: ZENDESK_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zendesk-exporter
                  key: api-token
                  optional: true
            # --- Auth option 2: OAuth token ---
            - name: ZENDESK_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zendesk-exporter
                  key: oauth-token
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      restartPolicy: Always
