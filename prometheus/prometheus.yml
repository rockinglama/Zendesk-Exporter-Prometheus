global:
  scrape_interval: 60s
  evaluation_interval: 60s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Zendesk Exporter
  - job_name: 'zendesk-exporter'
    static_configs:
      - targets: ['zendesk-exporter:9091']
    scrape_interval: 300s
    scrape_timeout: 60s
    metrics_path: /metrics